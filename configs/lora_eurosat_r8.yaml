\sectiontitle{4. LoRA-Pro: Gradient Mismatch}
If \(g_A=\partial \mathcal{L}/\partial A\) and
\(g_B=\partial \mathcal{L}/\partial B\), the corresponding first-order update in
the full weight space can be written as an induced gradient direction
\[
  \widetilde g = sB g_A + s g_B A.
\]

