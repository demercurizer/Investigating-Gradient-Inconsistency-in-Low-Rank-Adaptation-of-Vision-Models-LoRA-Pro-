This project tests whether gradient mismatch is a practical bottleneck for
low-rank adaptation of vision foundation models. Our preliminary results show
that the baseline pipeline is reproducible and that LoRA provides a strong
parameter-efficient starting point for the LoRA-Pro comparison.

