\sectiontitle{7. Preliminary Experiments}
We ran initial EuroSAT baselines using CLIP-ViT-B/16. Zero-shot CLIP gives a
sanity-check baseline. A frozen-backbone linear probe measures the quality of
the pretrained visual representation. Standard LoRA with rank $r=8$ provides
the first parameter-efficient fine-tuning baseline.

\begin{center}
\begin{tabular}{lccc}
\toprule
Method & Dataset & Accuracy & Trainable params \\
\midrule
Zero-shot CLIP & EuroSAT & \textbf{49.59\%} & 0 \\
Linear Probe & EuroSAT & \textbf{93.26\%} & 5.1K \\
LoRA $r=8$ & EuroSAT & \textbf{97.81\%} & 496.7K \\
\midrule
DoRA $r=8$ & EuroSAT & next stage & adapter + magnitude + head \\
LoRA-Pro $r=8$ & EuroSAT & next stage & adapter + head \\
\bottomrule
\end{tabular}
\end{center}

{\small
LoRA trains only \(496{,}650\) parameters out of \(150{,}117{,}387\), i.e.
approximately \(0.33\%\) of the model, while reaching \(97.81\%\) validation
accuracy on EuroSAT. These results validate the pipeline and establish the
baseline for the LoRA-Pro comparison.
}

% Other sections omitted for brevity

\sectiontitle{8. Expected Results and Next Steps}
The preliminary results confirm that the implementation, dataset loading,
evaluation protocol and checkpointing pipeline work on GPU. The next stage is
to compare LoRA against DoRA and LoRA-Pro under the same rank and target-module
budget.

The main research question is no longer whether LoRA improves over zero-shot
CLIP, but whether LoRA-Pro improves the optimization dynamics of low-rank
adaptation by reducing the effective gradient mismatch:
\[
  \Delta_{\mathrm{grad}}
  =
  \frac{\|\widetilde g - g\|_F}{\|g\|_F}.
\]

We will report accuracy, trainable parameters, training time, GPU memory and
gradient discrepancy for LoRA, DoRA and LoRA-Pro.

